name: Definitely Illegal — Auto Video Generator

on:
  schedule:
    # Every Saturday at 20:00 UTC — prime time for crimes
    - cron: "0 20 * * 6"
  workflow_dispatch:
    inputs:
      episode:
        description: "Episode number to generate (blank = next ungenerated)"
        required: false
        type: number

jobs:
  generate-video:
    name: Generate Episode
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # needed to commit generated.json back to the branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workflow/requirements.txt

      - name: Install Python dependencies
        run: pip install -r workflow/requirements.txt

      - name: Generate episode
        run: |
          if [ -n "${{ github.event.inputs.episode }}" ]; then
            python workflow/generate_free.py --episode ${{ github.event.inputs.episode }}
          else
            python workflow/generate_free.py
          fi

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: definitely-illegal-ep-${{ github.run_number }}
          path: workflow/output/
          retention-days: 30

      - name: Commit episode status
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workflow/generated.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: mark episode as generated [skip ci]"
          git push origin HEAD
